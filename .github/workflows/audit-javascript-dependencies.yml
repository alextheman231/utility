name: Audit dependencies

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/pnpm-lock.yaml"

jobs:
  audit-javascript-dependencies:
    permissions:
      contents: read
      pull-requests: write
    uses: alextheman231/github-actions/.github/workflows/audit-javascript-dependencies.yml@2b88b428425b25d437ecf743fc320528a9a25f4a # v12.5.0
    with:
      pull-request-number: ${{ github.event.pull_request.number }}
      node-version: 26
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
