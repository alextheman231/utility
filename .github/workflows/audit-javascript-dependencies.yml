name: Audit dependencies

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/pnpm-lock.yaml"

jobs:
  audit-javascript-dependencies:
    permissions:
      contents: read
      pull-requests: write
    uses: alextheman231/github-actions/.github/workflows/audit-javascript-dependencies.yml@aa8a3ef9f3e8d4e820402e4f6bf811af5298c3a9 # v12.4.1
    with:
      pull-request-number: ${{ github.event.pull_request.number }}
      node-version: 26
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
