name: Audit dependencies

on:
  pull_request:
    branches: ["main"]

jobs:
  audit-javascript-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.head_ref == 'alex-up-bot/update-dependencies' }}
    outputs:
      audit_result: ${{ steps.audit.outputs.audit_result }}
      peer_check_result: ${{ steps.peer_check.outputs.peer_check_result }}
      outdated_dependencies_result: ${{ steps.outdated_dependencies.outputs.outdated_dependencies_result }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install alex-c-line
        uses: alextheman231/typescript-actions/actions/safe-npm-dependency-global-install@52cf8adbb2d435944bbd882e03d0be6cdaeac243 # v1.2.1
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
          strict-version-resolution: false

      - name: Perform a general audit of the dependencies
        id: audit
        run: |
          AUDIT_RESULT="$(pnpm audit)"

          {
            echo "audit_result<<EOF"
            echo "$AUDIT_RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for peer dependency issues
        id: peer_check
        run: |
          PEER_CHECK="$(pnpm peers check)"

          {
            echo "peer_check_result<<EOF"
            echo "$PEER_CHECK"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for outdated dependencies
        id: outdated_dependencies
        run: |
          OUTDATED_DEPENDENCIES="$(alex-c-line internal outdated-dependencies)"

          {
            echo "outdated_dependencies_result<<EOF"
            echo "$OUTDATED_DEPENDENCIES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  comment-result:
    needs: audit-javascript-dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Find comment
        id: find_comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "alex-up-bot[bot]"
          body-includes: # JavaScript Dependency Audit

      - name: Get alex-up-bot GitHub token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ALEX_UP_BOT_APP_ID }}
          private-key: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Comment audit results on the pull request
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        id: create-comment
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            # JavaScript Dependency Audit

            ## General Audit

            ${{ needs.audit-javascript-dependencies.outputs.audit_result }}

            ## Peer Dependencies Check

            ${{ needs.audit-javascript-dependencies.outputs.peer_check_result }}

            ## Outdated Dependencies Check

            ${{ needs.audit-javascript-dependencies.outputs.outdated_dependencies_result }}
