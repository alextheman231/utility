  actions-ci:
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@c4545878d40d8cd0b3b08c8f693c27980b5f3e16 # v11.2.2

  end-to-end-ci:
    uses: alextheman231/github-actions/.github/workflows/end-to-end-node-package-ci.yml@c4545878d40d8cd0b3b08c8f693c27980b5f3e16 # v11.2.2
