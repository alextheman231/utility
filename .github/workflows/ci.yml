name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  package-ci:
    uses: alextheman231/github-actions/.github/workflows/package-ci.yml@4678b06c12b239500b3af61580637f9b7f3cd09a # v10.1.1

  actions-ci:
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@4678b06c12b239500b3af61580637f9b7f3cd09a # v10.1.1

  end-to-end-ci-steps:
    if: ${{ github.head_ref != 'alex-up-bot/change-major-version' && github.head_ref != 'alex-up-bot/change-minor-version' && github.head_ref != 'alex-up-bot/change-patch-version' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use PNPM
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run end-to-end tests
        run: pnpm run test-end-to-end

  end-to-end-ci:
    needs: end-to-end-ci-steps
    runs-on: ubuntu-latest
    if: always()
    env:
      CI_STATUS: ${{ needs.end-to-end-ci-steps.result }}
    steps:
      - name: Report on any matrix failures
        run: |
          if [ "$CI_STATUS" == "failure" ] || [ "$CI_STATUS" == "cancelled" ]; then
            exit 1
          fi
