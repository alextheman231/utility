name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  package-ci:
    uses: alextheman231/github-actions/.github/workflows/package-ci.yml@836601cc7cd1e60f2c0acfc60bbdb280908ef7e8 # v11.2.6

  actions-ci:
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@836601cc7cd1e60f2c0acfc60bbdb280908ef7e8 # v11.2.6

  end-to-end-ci:
    uses: alextheman231/github-actions/.github/workflows/end-to-end-node-package-ci.yml@836601cc7cd1e60f2c0acfc60bbdb280908ef7e8 # v11.2.6
