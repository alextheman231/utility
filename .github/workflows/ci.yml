name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  package-ci:
    uses: alextheman231/github-actions/.github/workflows/package-ci.yml@aa8a3ef9f3e8d4e820402e4f6bf811af5298c3a9 # v12.4.1
    with:
      node-version: 26

  actions-ci:
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@aa8a3ef9f3e8d4e820402e4f6bf811af5298c3a9 # v12.4.1

  end-to-end-ci:
    uses: alextheman231/github-actions/.github/workflows/end-to-end-node-package-ci.yml@aa8a3ef9f3e8d4e820402e4f6bf811af5298c3a9 # v12.4.1
    with:
      node-version: 26
