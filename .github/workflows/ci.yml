name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  package-ci:
    uses: alextheman231/github-actions/.github/workflows/package-ci.yml@2b88b428425b25d437ecf743fc320528a9a25f4a # v12.5.0
    with:
      node-version: 26

  actions-ci:
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@2b88b428425b25d437ecf743fc320528a9a25f4a # v12.5.0

  end-to-end-ci:
    uses: alextheman231/github-actions/.github/workflows/end-to-end-node-package-ci.yml@2b88b428425b25d437ecf743fc320528a9a25f4a # v12.5.0
    with:
      node-version: 26
