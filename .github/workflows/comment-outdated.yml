name: Comment outdated dependencies

on:
  pull_request:
    branches: ["main"]

jobs:
  comment-outdated:
    uses: alextheman231/github-actions/.github/workflows/comment-outdated.yml@4678b06c12b239500b3af61580637f9b7f3cd09a # v10.1.1
    if: ${{ github.head_ref == 'alex-up-bot/update-dependencies' }}
    permissions:
      actions: read
      checks: write
      contents: read
      pull-requests: write
    with:
      pull-request-number: ${{ github.event.pull_request.number }}
    secrets:
      APP_ID: ${{ secrets.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
