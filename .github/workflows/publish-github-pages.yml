name: Publish to GitHub Pages
on:
  workflow_dispatch:

jobs:
  publish-github-pages:
    permissions:
      pages: write
      id-token: write
    uses: alextheman231/github-actions/.github/workflows/publish-github-pages.yml@c4545878d40d8cd0b3b08c8f693c27980b5f3e16 # v11.2.2
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
    with:
      path: docs/features/html
      build-configs: true
