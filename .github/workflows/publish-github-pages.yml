name: Publish to GitHub Pages
on:
  workflow_dispatch:

jobs:
  publish-github-pages:
    permissions:
      pages: write
      id-token: write
    uses: alextheman231/github-actions/.github/workflows/publish-github-pages.yml@5a51ff516a9036a0f71712e2028f28d7e6fe955b # v12.0.1
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
    with:
      path: docs/features/html
      build-configs: true
