name: Scheduled Patch Release

on:
  workflow_dispatch:
  schedule:
    - cron: 0 21 1 * *

jobs:
  scheduled-patch-release:
    permissions:
      contents: write
    if: ${{ github.repository == 'alextheman231/utility' }}
    uses: alextheman231/github-actions/.github/workflows/scheduled-patch-release.yml@836601cc7cd1e60f2c0acfc60bbdb280908ef7e8 # v11.2.6
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
