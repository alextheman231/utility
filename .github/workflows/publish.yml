name: Publish the package

on:
  push:
    branches:
      - main

jobs:
  npm-registry-publish:
    permissions:
      id-token: write
    if: ${{ github.repository == 'alextheman231/utility' }}
    uses: alextheman231/github-actions/.github/workflows/npm-registry-publish.yml@be997cf2695bb8c42217f04f6f2bfbfacb0abb3e # v10.2.0

  create-github-release:
    needs: npm-registry-publish
    permissions:
      contents: write
    if: needs.npm-registry-publish.outputs.did_publish == 'true'
    uses: alextheman231/github-actions/.github/workflows/create-github-release.yml@be997cf2695bb8c42217f04f6f2bfbfacb0abb3e # v10.2.0
    secrets:
      APP_ID: ${{ secrets.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}

  publish-github-pages:
    permissions:
      pages: write
      id-token: write
    needs: create-github-release
    if: needs.create-github-release.outputs.did_release == 'true'
    uses: alextheman231/github-actions/.github/workflows/publish-github-pages.yml@be997cf2695bb8c42217f04f6f2bfbfacb0abb3e # v10.2.0
    secrets:
      APP_ID: ${{ secrets.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
